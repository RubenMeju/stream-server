<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Stream Starting Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00ff88;
    --green-dim: #00c865;
    --green-glow: rgba(0,255,136,0.4);
    --green-subtle: rgba(0,255,136,0.08);
    --dark: #020d06;
    --darker: #010905;
    --mid: #05200f;
    --font-mono: 'Share Tech Mono', monospace;
    --font-display: 'Orbitron', sans-serif;
  }

  body {
    background: var(--dark);
    color: var(--green);
    font-family: var(--font-mono);
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── SCANLINES ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* ── VIGNETTE ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.85) 100%);
    pointer-events: none;
    z-index: 99;
  }

  /* ── NOISE GRAIN ── */
  #grain {
    position: fixed;
    inset: 0;
    opacity: 0.035;
    z-index: 98;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 128px 128px;
  }

  /* ── GRID BG ── */
  #grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
  }

  /* ── CORNER BRACKETS ── */
  .bracket {
    position: fixed;
    width: 60px;
    height: 60px;
    z-index: 10;
    opacity: 0.5;
  }
  .bracket::before, .bracket::after { content: ''; position: absolute; background: var(--green); }
  .bracket::before { width: 100%; height: 2px; }
  .bracket::after  { width: 2px; height: 100%; }
  .bracket.tl { top: 24px; left: 24px; }
  .bracket.tr { top: 24px; right: 24px; transform: scaleX(-1); }
  .bracket.bl { bottom: 24px; left: 24px; transform: scaleY(-1); }
  .bracket.br { bottom: 24px; right: 24px; transform: scale(-1); }

  /* ── MAIN LAYOUT ── */
  #main {
    position: relative;
    z-index: 10;
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 0;
    width: min(1200px, 95vw);
    height: min(680px, 92vh);
    border: 1px solid rgba(0,255,136,0.2);
    box-shadow: 0 0 80px rgba(0,255,136,0.07), inset 0 0 80px rgba(0,0,0,0.5);
  }

  /* ── LEFT PANEL ── */
  #left {
    padding: 48px 52px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border-right: 1px solid rgba(0,255,136,0.15);
    background: rgba(0,255,136,0.02);
    position: relative;
    overflow: hidden;
  }

  #left::before {
    content: '';
    position: absolute;
    bottom: -120px;
    left: -120px;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,255,136,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* top label */
  .label-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    letter-spacing: 0.25em;
    opacity: 0.5;
    text-transform: uppercase;
  }
  .label-row .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--green-glow); }
    50% { opacity: 0.4; box-shadow: 0 0 0 6px transparent; }
  }

  /* headline */
  #headline {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(36px, 4vw, 56px);
    line-height: 1.05;
    letter-spacing: -0.01em;
    text-shadow: 0 0 40px rgba(0,255,136,0.3);
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.3s;
  }
  #headline span {
    display: block;
    color: rgba(0,255,136,0.35);
    font-size: 0.5em;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-shadow: none;
    margin-bottom: 6px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* countdown */
  #countdown-wrap {
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.6s;
  }

  #countdown {
    font-family: var(--font-display);
    font-size: clamp(52px, 6vw, 80px);
    font-weight: 700;
    letter-spacing: 0.04em;
    text-shadow:
      0 0 20px var(--green-glow),
      0 0 60px rgba(0,255,136,0.15);
    line-height: 1;
    position: relative;
  }

  #countdown-label {
    font-size: 11px;
    letter-spacing: 0.3em;
    opacity: 0.4;
    margin-top: 8px;
    text-transform: uppercase;
  }

  /* progress bar */
  #bar-wrap {
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.9s;
  }

  #bar-track {
    width: 100%;
    height: 3px;
    background: rgba(0,255,136,0.1);
    position: relative;
    overflow: visible;
  }

  #bar-fill {
    height: 100%;
    width: 0%;
    background: var(--green);
    position: relative;
    transition: width 1s linear;
    box-shadow: 0 0 12px var(--green-glow);
  }

  #bar-fill::after {
    content: '';
    position: absolute;
    right: -1px;
    top: 50%;
    transform: translateY(-50%);
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 10px var(--green);
  }

  #bar-pct {
    font-size: 11px;
    letter-spacing: 0.15em;
    opacity: 0.4;
    margin-top: 10px;
    text-align: right;
  }

  /* ── RIGHT PANEL ── */
  #right {
    display: flex;
    flex-direction: column;
    background: rgba(0,0,0,0.3);
    overflow: hidden;
  }

  #terminal-header {
    padding: 14px 20px;
    border-bottom: 1px solid rgba(0,255,136,0.12);
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,255,136,0.04);
  }
  .win-btn {
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(0,255,136,0.2);
    border: 1px solid rgba(0,255,136,0.3);
  }
  #terminal-title {
    font-size: 11px;
    letter-spacing: 0.15em;
    opacity: 0.4;
    margin-left: 6px;
  }

  #terminal-body {
    flex: 1;
    padding: 20px 20px 20px 20px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .t-line {
    font-size: 13px;
    line-height: 1.8;
    opacity: 0;
    white-space: nowrap;
    overflow: hidden;
    color: var(--green-dim);
    transition: opacity 0.3s;
  }
  .t-line.done { opacity: 1; }
  .t-line .prompt { opacity: 0.35; }
  .t-line.success { color: #00ff88; }
  .t-line.success::before { content: '✓ '; opacity: 0.6; }
  .t-line.error { color: #ff4c4c; } /* rojo para errores */
  .t-line.error::before { content: '✖ '; opacity: 0.6; }

  #cursor-line {
    font-size: 13px;
    line-height: 1.8;
    color: var(--green);
    opacity: 0;
    transition: opacity 0.3s;
  }
  #cursor-line.visible { opacity: 1; }

  .cursor-blink {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: var(--green);
    vertical-align: middle;
    margin-left: 2px;
    animation: blink 1.1s step-end infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* separator */
  .t-sep {
    height: 1px;
    background: rgba(0,255,136,0.08);
    margin: 10px 0;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .t-sep.done { opacity: 1; }

  /* ascii noise area */
  #ascii-area {
    border-top: 1px solid rgba(0,255,136,0.1);
    padding: 12px 20px;
    height: 110px;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }
  #ascii-area::before {
    content: 'DATA STREAM';
    position: absolute;
    top: 12px;
    right: 16px;
    font-size: 9px;
    letter-spacing: 0.2em;
    opacity: 0.2;
  }
  #ascii-lines {
    font-size: 10px;
    line-height: 1.5;
    opacity: 0.25;
    color: var(--green);
    overflow: hidden;
    height: 100%;
  }

  /* status bar bottom */
  #status-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 28px;
    background: rgba(0,255,136,0.06);
    border-top: 1px solid rgba(0,255,136,0.12);
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 32px;
    z-index: 50;
    font-size: 10px;
    letter-spacing: 0.15em;
    opacity: 0.45;
  }
  .status-item::before { content: '■ '; font-size: 7px; }

  /* live pulse */
  #live-badge {
    position: fixed;
    top: 28px;
    right: 90px;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 0.2em;
    opacity: 0;
    animation: fadeIn 1s ease forwards 1.5s;
  }
  #live-badge .ring {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 0 var(--green-glow);
    animation: ring-pulse 2s ease-out infinite;
  }
  @keyframes ring-pulse {
    0% { box-shadow: 0 0 0 0 rgba(0,255,136,0.6); }
    70% { box-shadow: 0 0 0 10px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* DONE state */
  #done-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--dark);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.5s ease;
    flex-direction: column;
    gap: 24px;
  }
  #done-overlay.show {
    opacity: 1;
    pointer-events: all;
  }
  #done-text {
    font-family: var(--font-display);
    font-size: clamp(40px, 6vw, 80px);
    font-weight: 900;
    letter-spacing: 0.05em;
    text-shadow: 0 0 60px rgba(0,255,136,0.5), 0 0 120px rgba(0,255,136,0.2);
    animation: glitch-text 4s infinite;
  }
  @keyframes glitch-text {
    0%, 90%, 100% { text-shadow: 0 0 60px rgba(0,255,136,0.5), 0 0 120px rgba(0,255,136,0.2); clip-path: none; }
    92% { transform: translate(-2px, 0); filter: hue-rotate(90deg); }
    94% { transform: translate(2px, 0); filter: hue-rotate(-90deg); }
    96% { transform: none; filter: none; }
  }
  #done-sub {
    font-size: 13px;
    letter-spacing: 0.35em;
    opacity: 0.4;
  }
</style>
</head>
<body>

<div id="grain"></div>
<div id="grid-bg"></div>

<div class="bracket tl"></div>
<div class="bracket tr"></div>
<div class="bracket bl"></div>
<div class="bracket br"></div>

<div id="live-badge">
  <div class="ring"></div>
  STANDBY
</div>

<div id="main">
  <!-- LEFT -->
  <div id="left">
    <div class="label-row">
      <div class="dot"></div>
      BROADCAST SYSTEM v2.4.1
    </div>

    <div>
      <div id="headline">
        <span>GET READY</span>
        EL STREAM<br>COMENZARA<br>PRONTO
      </div>
    </div>

    <div id="countdown-wrap">
      <div id="countdown">00:00</div>
      <div id="countdown-label">TIEMPO RESTANTE</div>
    </div>

    <div id="bar-wrap">
      <div id="bar-track">
        <div id="bar-fill"></div>
      </div>
      <div id="bar-pct">0%</div>
    </div>
  </div>

  <!-- RIGHT -->
  <div id="right">
    <div id="terminal-header">
      <div class="win-btn"></div>
      <div class="win-btn"></div>
      <div class="win-btn"></div>
      <span id="terminal-title">SYSTEM — INIT SEQUENCE</span>
    </div>
    <div id="terminal-body">
      <!-- lines injected by JS -->
    </div>
    <div id="ascii-area">
      <div id="ascii-lines"></div>
    </div>
  </div>
</div>

<div id="status-bar">
  <span class="status-item">STREAM CORE ONLINE</span>
  <span class="status-item">TWITCH CONNECTED</span>
  <span class="status-item">OVERLAY ACTIVE</span>
  <span class="status-item" id="fps-counter">60 FPS</span>
</div>


<script>
const TOTAL_TIME = 10 * 60; // 10 minutos
const termLines = [
  { text: "Iniciando motor de memes...", delay: 500 },
  { text: "Cargando 1.234 videos de gatos...", delay: 5500, success: true },

  // Secuencia de la paloma
  { text: "Conectando a Twitch… vía paloma mensajera", delay: 11000 },
  { text: "¡La paloma se ha perdido!", delay: 17000, error: true },
  { text: "Buscando paloma en el espacio-tiempo…", delay: 23000 },
  { text: "Hackeando Twitch para recuperar la paloma…", delay: 29000, error: true },
  { text: "Paloma encontrada en la dimensión de los gatos…", delay: 35000, success: true },
  { text: "Reconectando stream…", delay: 41000, error: true },

  // Secuencia normal
  { text: "Autenticando sesión cuántica...", delay: 47000, success: true },
  { text: "Lanzando overlays… paciencia, o no", delay: 53000 },
  { text: "Calibrando audio a 11/10 decibelios", delay: 59000, success: true },
  { text: "Conectando con el chat…", delay: 65000, error: true },
  { text: "Colacao para el streamer…", delay: 71000 },
  { text: "Sincronizando relojes con universo paralelo…", delay: 77000 },
  { text: "Actualizando gráficos mentales…", delay: 83000 , error: true },
  { text: "Verificando trolls amistosos…", delay: 89000 },
  { text: "Ajustando niveles de hype…", delay: 95000, success: true },
  { text: "Entrenando a los bots para el chat…", delay: 101000 },
  { text: "Afinando la conexión con la fuerza…", delay: 107000 },
  { text: "¡Sistema listo! Que comience el show…", delay: 113000, success: true },
];
const termBody = document.getElementById("terminal-body");

// Build terminal lines
termLines.forEach((item, i) => {
  const line = document.createElement("div");
  line.className = "t-line" + (item.success ? " success" : "") + (item.error ? " error" : "");
  line.innerHTML = `<span class="prompt">&gt; </span>${item.text}`;
  line.id = `tline-${i}`;
  termBody.appendChild(line);
});

// separator
const sep = document.createElement("div");
sep.className = "t-sep";
sep.id = "t-sep";
termBody.appendChild(sep);

// cursor line
const cursorLine = document.createElement("div");
cursorLine.id = "cursor-line";
cursorLine.innerHTML = `<span class="prompt">&gt; </span><span class="cursor-blink"></span>`;
termBody.appendChild(cursorLine);

// reveal lines
termLines.forEach((item, i) => {
  setTimeout(() => {
    document.getElementById(`tline-${i}`).classList.add("done");
  }, item.delay);
});
setTimeout(() => {
  document.getElementById("t-sep").classList.add("done");
  cursorLine.classList.add("visible");
}, 3800);

// ASCII noise
const ASCII_CHARS = "01░▒▓│┤╡╢╖╕╣║╗╝╜╛┐└┴┬├─┼╞╟╚╔╩╦╠═╬╧╨╤╥╙╘╒╓╫╪┘┌";
const asciiDiv = document.getElementById("ascii-lines");
let asciiActive = false;
setTimeout(() => { asciiActive = true; }, 1000);

setInterval(() => {
  if (!asciiActive) return;
  let line = "";
  for (let i = 0; i < 48; i++) {
    line += ASCII_CHARS[Math.floor(Math.random() * ASCII_CHARS.length)];
  }
  asciiDiv.innerHTML += line + "\n";
  const rows = asciiDiv.innerHTML.split("\n");
  if (rows.length > 7) asciiDiv.innerHTML = rows.slice(-7).join("\n");
}, 120);

// COUNTDOWN
let remaining = TOTAL_TIME;
const countdownEl = document.getElementById("countdown");
const barFill = document.getElementById("bar-fill");
const barPct  = document.getElementById("bar-pct");
const liveBadge = document.getElementById("live-badge");

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2,"0") + ":" + String(sec).padStart(2,"0");
}

countdownEl.textContent = formatTime(remaining);

const timer = setInterval(() => {
  remaining--;
  if (remaining <= 0) {
    clearInterval(timer);
    countdownEl.textContent = "00:00";
    barFill.style.width = "100%";
    barPct.textContent = "100%";
    asciiActive = false;

    return;
  }
  const pct = ((TOTAL_TIME - remaining) / TOTAL_TIME) * 100;
  countdownEl.textContent = formatTime(remaining);
  barFill.style.width = pct + "%";
  barPct.textContent = Math.round(pct) + "%";
}, 1000);

// FPS counter (cosmetic)
let lastTime = performance.now();
let frames = 0;
const fpsEl = document.getElementById("fps-counter");
function fpsLoop(now) {
  frames++;
  if (now - lastTime >= 1000) {
    fpsEl.textContent = frames + " FPS";
    frames = 0;
    lastTime = now;
  }
  requestAnimationFrame(fpsLoop);
}
requestAnimationFrame(fpsLoop);
</script>

</body>
</html>
