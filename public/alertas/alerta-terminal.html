<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Alerta Hacker Terminal</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="alerta-terminal.css" />
  </head>

  <body>
    <div id="alerta">
      <div class="terminal">
        <div class="glitch-layer"></div>

        <div class="title-bar">
          <div class="title-dots">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
          </div>

          <span class="title-text">bash — root@stream:~</span>
          <span class="title-right" id="termClock">00:00:00</span>
        </div>

        <div class="term-body" id="termBody">
          <span class="cursor" id="cursor"></span>
        </div>

        <div class="countdown-bar">
          <div class="countdown-fill" id="cdFill"></div>
        </div>
      </div>
    </div>

    <audio id="alertSound" src="../sound-terminal.mp3"></audio>
    <script src="alerta-terminal.js"></script>
  </body>
</html>
