<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <style>
      :root {
        --green: #00ff41;
        --dim: #00ff4144;
      }

      body {
        background: transparent;
        margin: 0;
        font-family: monospace;
        color: var(--green);
      }

      /* Caja principal */

      #box {
        width: 320px;
        padding: 14px;
        border: 1px solid var(--dim);
        background: #00000066;
        box-shadow:
          0 0 10px #00ff4122,
          inset 0 0 20px #000;
      }

      /* Título */

      #title {
        font-size: 12px;
        letter-spacing: 2px;
        margin-bottom: 6px;
        color: #00ff4188;
      }

      /* Números */

      #numbers {
        font-size: 18px;
        margin-bottom: 8px;
        text-shadow: 0 0 6px #00ff41;
      }

      /* Barra */

      .bar {
        height: 10px;
        background: #001a00;
        border: 1px solid var(--dim);
        overflow: hidden;
      }

      .fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #00aa22, #00ff41);
        box-shadow: 0 0 8px #00ff41;
        transition: width 0.5s ease;
      }

      /* porcentaje */

      #pct {
        margin-top: 6px;
        font-size: 12px;
        color: #00ff4199;
      }
    </style>
  </head>

  <body>
    <div id="box">
      <div id="title">FOLLOWER_GOAL.exe</div>

      <div id="numbers">0 / 500</div>

      <div class="bar">
        <div class="fill" id="fill"></div>
      </div>

      <div id="pct">0%</div>
    </div>

    <script>
      let socket;

      function connect() {
        const loc = window.location;
        const wsProtocol = loc.protocol === "https:" ? "wss" : "ws";
        const socket = new WebSocket(`${wsProtocol}://${loc.host}/`);

        socket.onopen = () => {
          console.log("overlay conectado");
        };

        socket.onmessage = (evt) => {
          const data = JSON.parse(evt.data);

          if (data.type === "goal") {
            const pct = Math.min((data.current / data.goal) * 100, 100);

            document.getElementById("numbers").textContent =
              data.current + " / " + data.goal;

            document.getElementById("fill").style.width = pct + "%";

            document.getElementById("pct").textContent = pct.toFixed(1) + "%";
          }
        };

        socket.onclose = () => {
          console.log("overlay desconectado");

          setTimeout(connect, 3000);
        };
      }

      connect();
    </script>
  </body>
</html>
