<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alerta de Seguidores</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    overflow: hidden;
  }

  /* ── Canvas de partículas ── */
  #particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Contenedor principal ── */
  #alerta {
    display: none;
    position: fixed;
    top: 18%;
    left: 50%;
    transform: translateX(-50%) scaleX(0);
    transform-origin: center;
    z-index: 10;
    width: 540px;
  }

  #alerta.visible {
    animation: revealCard 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  #alerta.hiding {
    animation: hideCard 0.5s ease-in forwards;
  }

  @keyframes revealCard {
    0%   { transform: translateX(-50%) scaleX(0) scaleY(0.6); opacity: 0; }
    60%  { transform: translateX(-50%) scaleX(1.03) scaleY(1.02); opacity: 1; }
    100% { transform: translateX(-50%) scaleX(1) scaleY(1); opacity: 1; }
  }

  @keyframes hideCard {
    0%   { transform: translateX(-50%) scaleX(1) scaleY(1); opacity: 1; }
    100% { transform: translateX(-50%) scaleX(0) scaleY(0.6); opacity: 0; }
  }

  /* ── Tarjeta ── */
  .card {
    position: relative;
    background: linear-gradient(135deg, #0a0a0f 0%, #10101e 50%, #0a0a14 100%);
    border-radius: 4px;
    padding: 2px;
    overflow: hidden;
  }

  /* Borde animado */
  .card::before {
    content: '';
    position: absolute;
    inset: -2px;
    background: conic-gradient(
      from var(--angle, 0deg),
      #00f5ff, #bf00ff, #ff0080, #00f5ff
    );
    border-radius: 6px;
    z-index: -1;
    animation: rotateBorder 2s linear infinite;
  }

  @property --angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }

  @keyframes rotateBorder {
    to { --angle: 360deg; }
  }

  .card-inner {
    background: linear-gradient(135deg, #08080f 0%, #0e0e1e 100%);
    border-radius: 3px;
    padding: 28px 36px 24px;
    position: relative;
    overflow: hidden;
  }

  /* Scanlines */
  .card-inner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 245, 255, 0.015) 2px,
      rgba(0, 245, 255, 0.015) 4px
    );
    pointer-events: none;
    border-radius: 3px;
  }

  /* Glitch horizontal line */
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00f5ff, transparent);
    top: -10%;
    animation: scanMove 3s linear infinite;
    opacity: 0.4;
  }

  @keyframes scanMove {
    0%   { top: -5%; }
    100% { top: 110%; }
  }

  /* ── Encabezado con ícono ── */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .icon-wrap {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #bf00ff, #7700cc);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px #bf00ff88, 0 0 40px #bf00ff44;
    animation: iconPulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes iconPulse {
    0%, 100% { box-shadow: 0 0 20px #bf00ff88, 0 0 40px #bf00ff44; }
    50%       { box-shadow: 0 0 30px #bf00ffcc, 0 0 60px #bf00ff66; }
  }

  .icon-wrap svg {
    width: 22px; height: 22px;
    fill: #fff;
  }

  .label-top {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #bf00ff;
    text-shadow: 0 0 10px #bf00ff;
    line-height: 1;
  }

  /* ── Nombre ── */
  .name-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 8px;
  }

  .name-prefix {
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    color: #aaaacc;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  #nombreSeguidor {
    font-family: 'Orbitron', sans-serif;
    font-size: 34px;
    font-weight: 900;
    background: linear-gradient(90deg, #00f5ff, #bf00ff, #ff0080);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: textShift 3s linear infinite;
    text-shadow: none;
    letter-spacing: 2px;
    position: relative;
  }

  @keyframes textShift {
    0%   { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }

  /* Glitch del nombre */
  #nombreSeguidor.glitch {
    animation: textShift 3s linear infinite, glitch 0.1s steps(2) 3;
  }

  @keyframes glitch {
    0%   { clip-path: inset(20% 0 60% 0); transform: translate(-3px, 0); }
    33%  { clip-path: inset(60% 0 10% 0); transform: translate(3px, 0); }
    66%  { clip-path: inset(40% 0 30% 0); transform: translate(-2px, 0); }
    100% { clip-path: inset(0); transform: translate(0); }
  }

  /* ── Divisor ── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #00f5ff55, #bf00ff55, transparent);
    margin: 12px 0;
    position: relative;
  }

  .divider::after {
    content: '◆';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    color: #bf00ff;
    font-size: 8px;
    text-shadow: 0 0 8px #bf00ff;
  }

  /* ── Mensaje inferior ── */
  .sub-message {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #445577;
    text-align: right;
  }

  .sub-message span {
    color: #00f5ff99;
  }

  /* ── Barra de progreso countdown ── */
  .progress-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    width: 100%;
    background: linear-gradient(90deg, #00f5ff, #bf00ff, #ff0080);
    transform-origin: left;
    animation: countdown 5s linear forwards;
    box-shadow: 0 0 6px #00f5ff;
  }

  @keyframes countdown {
    from { transform: scaleX(1); }
    to   { transform: scaleX(0); }
  }

  /* ── Corner decorations ── */
  .corner {
    position: absolute;
    width: 14px; height: 14px;
    border-color: #00f5ff;
    border-style: solid;
    opacity: 0.7;
  }
  .corner-tl { top: 6px; left: 6px; border-width: 2px 0 0 2px; }
  .corner-tr { top: 6px; right: 6px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: 6px; left: 6px; border-width: 0 0 2px 2px; }
  .corner-br { bottom: 6px; right: 6px; border-width: 0 2px 2px 0; }

</style>
</head>
<body>

<canvas id="particles"></canvas>

<div id="alerta">
  <div class="card">
    <div class="card-inner">
      <div class="scan-line"></div>
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <div class="header">
        <div class="icon-wrap">
          <!-- Twitch-style heart / follow icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5
                     2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09
                     C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5
                     c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
        </div>
        <div class="label-top">Nuevo Seguidor</div>
      </div>

      <div class="name-row">
        <span class="name-prefix">Bienvenido/a,</span>
        <span id="nombreSeguidor">—</span>
      </div>

      <div class="divider"></div>

      <div class="sub-message">
        gracias por el <span>follow</span> · ¡eres increíble!
      </div>

      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>
</div>

<audio id="alertSound" src="sound.mp3"></audio>

<script>
/* ── Partículas ──────────────────────────────────── */
window.addEventListener('load', () => {
  const sonido = document.getElementById('alertSound');
  sonido.volume = 1; // asegúrate que el volumen esté al 100%
  sonido.play().catch(() => {}); // ignora el error, solo desbloquea autoplay
});

const canvas = document.getElementById('particles');
const ctx    = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;

const COLORS = ['#00f5ff', '#bf00ff', '#ff0080', '#ffffff'];
let particles = [];

function spawnBurst(x, y, count = 40) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.012 + Math.random() * 0.018,
      radius: 1.5 + Math.random() * 3,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      trail: []
    });
  }
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.life > 0);

  for (const p of particles) {
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 6) p.trail.shift();

    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.08; // gravity
    p.life -= p.decay;

    // Trail
    for (let i = 0; i < p.trail.length; i++) {
      const alpha = (i / p.trail.length) * p.life * 0.4;
      ctx.beginPath();
      ctx.arc(p.trail[i].x, p.trail[i].y, p.radius * (i / p.trail.length), 0, Math.PI * 2);
      ctx.fillStyle = p.color + Math.floor(alpha * 255).toString(16).padStart(2,'0');
      ctx.fill();
    }

    // Particle
    ctx.globalAlpha = p.life;
    ctx.shadowBlur  = 8;
    ctx.shadowColor = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.shadowBlur  = 0;
  }

  requestAnimationFrame(animateParticles);
}
animateParticles();

/* ── Lógica de la alerta ───────────────────────── */
function mostrarAlerta(nombre) {
  const alerta      = document.getElementById('alerta');
  const nombreSpan  = document.getElementById('nombreSeguidor');
  const sonido      = document.getElementById('alertSound');
  const bar         = document.getElementById('progressBar');

  // Reset estado
  alerta.classList.remove('hiding', 'visible');
  nombreSpan.classList.remove('glitch');
  bar.style.animation = 'none';
  bar.getBoundingClientRect(); // reflow
  bar.style.animation = '';

  // Nombre
  nombreSpan.textContent = nombre;

  // Mostrar
  alerta.style.display = 'block';
  requestAnimationFrame(() => {
    alerta.classList.add('visible');
    // Glitch efecto al nombre tras 300ms
    setTimeout(() => nombreSpan.classList.add('glitch'), 300);
  });

  // Burst de partículas desde el centro de la tarjeta
  const rect = alerta.getBoundingClientRect();
  const cx = rect.left + rect.width  / 2;
  const cy = rect.top  + rect.height / 2;
  spawnBurst(cx, cy, 60);
  setTimeout(() => spawnBurst(cx - 80, cy, 25), 200);
  setTimeout(() => spawnBurst(cx + 80, cy, 25), 350);

  // Sonido
  sonido.currentTime = 0;
  sonido.play().catch(err => console.error('Error de audio:', err));

  // Ocultar tras 5 s
  setTimeout(() => {
    alerta.classList.add('hiding');
    alerta.classList.remove('visible');
    setTimeout(() => {
      alerta.style.display = 'none';
      alerta.classList.remove('hiding');
    }, 500);
  }, 5000);
}

/* ── WebSocket ──────────────────────────────────── */
const socket = new WebSocket('ws://localhost:8080');
socket.onopen    = () => console.log('✅ Conectado al WebSocket');
socket.onerror   = err  => console.error('❌ Error WebSocket:', err);
socket.onmessage = evt  => mostrarAlerta(evt.data);

// setTimeout(() => mostrarAlerta('NombreDemo'), 1000); // DEBUG
</script>
</body>
</html>
